name: pack

# Keeps `main` always installable: builds the viewer, type-checks, validates the
# plugin layout, re-bundles the MCP server so the committed bundle the marketplace
# ships is never stale, and BUMPS THE PATCH VERSION on every push so `/plugin update`
# always sees a new version and actually re-installs (an unchanged version is treated
# as up-to-date and skipped, so changes would never reach users otherwise).
#
# Requires: Settings → Actions → General → Workflow permissions → "Read and write".

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Plain install (no --frozen): if the runner's bun is older than the one
      # that wrote bun.lock, it harmlessly ignores the lockfile and resolves fresh.
      - name: Install
        run: bun install

      - name: Build (typecheck + viewer + MCP bundle)
        run: bun run build

      - name: Validate plugin layout
        run: node scripts/validate-plugin.mjs

      - name: Bump version + commit refreshed bundle (main only)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Bump the patch version every push so `/plugin update` always re-installs.
          node scripts/bump-version.mjs
          # Stage the version bump plus the bundle if it drifted from source.
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json mcp/server.bundle.mjs
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "ci: bump version + refresh MCP bundle [skip ci]"
            git push
          fi
